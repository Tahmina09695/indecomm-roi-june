<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="uw-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E2F1FB"/>
      <stop offset="100%" stop-color="#C5E2F4"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" rx="14" fill="url(#uw-bg)"/>

  <!-- Decision tree branching -->
  <g transform="translate(40,30)">
    <!-- root -->
    <circle cx="50" cy="60" r="14" fill="#2076BA"/>
    <text x="50" y="65" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="800" font-size="11" fill="#FFFFFF">UW</text>

    <!-- branches -->
    <line x1="64" y1="60" x2="120" y2="20" stroke="#2076BA" stroke-width="3"/>
    <line x1="64" y1="60" x2="120" y2="60" stroke="#2076BA" stroke-width="3"/>
    <line x1="64" y1="60" x2="120" y2="100" stroke="#2076BA" stroke-width="3"/>

    <!-- approve -->
    <circle cx="134" cy="20" r="12" fill="#8BCC9A"/>
    <path d="M129 20 l4 4 l7 -8" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="152" y="24" font-family="Open Sans, sans-serif" font-weight="700" font-size="11" fill="#002060">Approve</text>

    <!-- conditions -->
    <circle cx="134" cy="60" r="12" fill="#F1A421"/>
    <text x="134" y="64" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="800" font-size="12" fill="#FFFFFF">?</text>
    <text x="152" y="64" font-family="Open Sans, sans-serif" font-weight="700" font-size="11" fill="#002060">Conditions</text>

    <!-- deny -->
    <circle cx="134" cy="100" r="12" fill="#FF0066"/>
    <line x1="129" y1="95" x2="139" y2="105" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="139" y1="95" x2="129" y2="105" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    <text x="152" y="104" font-family="Open Sans, sans-serif" font-weight="700" font-size="11" fill="#002060">Deny</text>
  </g>

  <!-- DecisionGenius badge -->
  <g transform="translate(240,46)">
    <circle cx="40" cy="40" r="36" fill="#2076BA"/>
    <text x="40" y="36" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="800" font-size="14" fill="#FFFFFF">DG</text>
    <text x="40" y="52" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="700" font-size="9" fill="#E2F1FB">DECISION</text>
    <text x="40" y="100" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="700" font-size="10" fill="#002060">Genius + AG</text>
  </g>
</svg>
