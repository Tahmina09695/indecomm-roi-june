<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="pch-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2EDF9"/>
      <stop offset="100%" stop-color="#E2D7F0"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" rx="14" fill="url(#pch-bg)"/>

  <!-- Stack of three documents -->
  <g transform="translate(40,30)">
    <!-- back doc -->
    <rect x="20" y="20" width="120" height="120" rx="8" fill="#FFFFFF" stroke="#8064A2" stroke-width="2" opacity="0.6" transform="rotate(-7 80 80)"/>
    <!-- middle doc -->
    <rect x="14" y="14" width="120" height="120" rx="8" fill="#FFFFFF" stroke="#8064A2" stroke-width="2" opacity="0.85" transform="rotate(-2 80 80)"/>
    <!-- front doc -->
    <rect x="8" y="8" width="120" height="120" rx="8" fill="#FFFFFF" stroke="#8064A2" stroke-width="3"/>
    <!-- corner fold -->
    <path d="M 108 8 L 128 8 L 128 28 Z" fill="#E2D7F0" stroke="#8064A2" stroke-width="2"/>
    <!-- lines -->
    <rect x="20" y="28" width="80" height="6" rx="3" fill="#002060"/>
    <rect x="20" y="44" width="60" height="5" rx="2.5" fill="#94A3B8"/>
    <rect x="20" y="60" width="92" height="5" rx="2.5" fill="#CBD5E1"/>
    <rect x="20" y="74" width="80" height="5" rx="2.5" fill="#CBD5E1"/>
    <rect x="20" y="88" width="70" height="5" rx="2.5" fill="#CBD5E1"/>
    <!-- stamp -->
    <circle cx="98" cy="108" r="14" fill="none" stroke="#8064A2" stroke-width="2.5"/>
    <text x="98" y="113" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="800" font-size="11" fill="#8064A2">OK</text>
  </g>

  <!-- DocGenius badge -->
  <g transform="translate(210,40)">
    <circle cx="40" cy="40" r="36" fill="#8064A2"/>
    <text x="40" y="46" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="800" font-size="18" fill="#FFFFFF">DOC</text>
    <text x="40" y="92" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="700" font-size="11" fill="#002060">DocGenius</text>
  </g>
</svg>
