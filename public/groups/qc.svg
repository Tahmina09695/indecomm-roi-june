<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="qc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF7E6"/>
      <stop offset="100%" stop-color="#FFEAC2"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" rx="14" fill="url(#qc-bg)"/>
  <!-- Checklist card -->
  <rect x="40" y="32" width="160" height="116" rx="10" fill="#ffffff" stroke="#F1A421" stroke-width="2"/>
  <!-- header line -->
  <rect x="56" y="48" width="100" height="8" rx="4" fill="#002060"/>
  <rect x="56" y="64" width="60" height="6" rx="3" fill="#94A3B8"/>
  <!-- check rows -->
  <g>
    <circle cx="62" cy="92" r="6" fill="#F1A421"/>
    <path d="M59 92 l3 3 l5 -6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="76" y="89" width="100" height="6" rx="3" fill="#1E3A8A"/>
  </g>
  <g>
    <circle cx="62" cy="112" r="6" fill="#F1A421"/>
    <path d="M59 112 l3 3 l5 -6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="76" y="109" width="80" height="6" rx="3" fill="#1E3A8A"/>
  </g>
  <g>
    <circle cx="62" cy="132" r="6" fill="#FFFFFF" stroke="#F1A421" stroke-width="2"/>
    <rect x="76" y="129" width="90" height="6" rx="3" fill="#CBD5E1"/>
  </g>

  <!-- Magnifying glass -->
  <g transform="translate(208,40)">
    <circle cx="40" cy="40" r="36" fill="#FFFFFF" stroke="#002060" stroke-width="5"/>
    <circle cx="40" cy="40" r="22" fill="#FFE9C2" stroke="#002060" stroke-width="3"/>
    <text x="40" y="46" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="800" font-size="20" fill="#002060">QC</text>
    <line x1="66" y1="66" x2="92" y2="92" stroke="#002060" stroke-width="8" stroke-linecap="round"/>
    <line x1="66" y1="66" x2="92" y2="92" stroke="#F1A421" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
