<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="auto-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E2F1FB"/>
      <stop offset="100%" stop-color="#BFDFF1"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" rx="14" fill="url(#auto-bg)"/>

  <!-- Productivity uplift arrow chart -->
  <g transform="translate(36,30)">
    <!-- baseline bars -->
    <rect x="0" y="80" width="14" height="34" rx="3" fill="#94A3B8"/>
    <rect x="20" y="56" width="14" height="58" rx="3" fill="#94A3B8"/>
    <rect x="40" y="40" width="14" height="74" rx="3" fill="#94A3B8"/>
    <!-- improved bars (taller) -->
    <rect x="68" y="40" width="14" height="74" rx="3" fill="#2BA8E0"/>
    <rect x="88" y="20" width="14" height="94" rx="3" fill="#2BA8E0"/>
    <rect x="108" y="0" width="14" height="114" rx="3" fill="#2BA8E0"/>

    <!-- trend arrow -->
    <path d="M 4 96 L 124 6" stroke="#F1A421" stroke-width="3" stroke-linecap="round"/>
    <polygon points="124,6 116,6 122,14" fill="#F1A421"/>
    <text x="60" y="138" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="700" font-size="10" fill="#002060">Productivity Uplift</text>
  </g>

  <!-- AI/Automation badge -->
  <g transform="translate(216,40)">
    <circle cx="40" cy="40" r="36" fill="#002060"/>
    <text x="40" y="36" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="800" font-size="20" fill="#2BA8E0">AI</text>
    <text x="40" y="56" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="700" font-size="9" fill="#E2F1FB">AUTOMATION</text>
    <!-- orbiting dots -->
    <circle cx="76" cy="40" r="4" fill="#F1A421"/>
    <circle cx="4" cy="40" r="4" fill="#2BA8E0"/>
    <circle cx="40" cy="4" r="4" fill="#F1A421"/>
    <circle cx="40" cy="76" r="4" fill="#2BA8E0"/>
    <text x="40" y="98" text-anchor="middle" font-family="Open Sans, sans-serif" font-weight="700" font-size="10" fill="#002060">SaaS Platforms</text>
  </g>
</svg>
